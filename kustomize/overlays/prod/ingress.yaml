apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mpaviewer-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: mpaviewer.dbca.wa.gov.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mpaviewer-clusterip-prod
                port:
                  number: 8080
    - host: marinedashboard.dbca.wa.gov.au
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mpaviewer-clusterip-prod
                port:
                  number: 8080
